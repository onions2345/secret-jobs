name: Build Secret Jobs

on:
  push:                 # <-- auto-runs every time you upload/commit files
    branches: [ main ]
  schedule:
    - cron: "17 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m secretjobs.main
      - name: Commit state
        run: |
          git config user.name "secretjobs-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ || true
          git commit -m "Update jobs" || echo "no changes"
          git push || echo "nothing to push"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
